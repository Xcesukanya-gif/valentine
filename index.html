<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VALENTINE'S DAY🌸</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <div class="card-header">
            <h1>For NaoNao Kub💖</h1>
        </div>
        <div class="card-body">
            <!-- รูปภาพเรียงกัน -->
            <div class="image-grid">
                <img src="image/1.PNG" alt="Valentine Image" class="card-image">
                <img src="image/2.PNG" alt="Valentine Image" class="card-image">
                <img src="image/3.PNG" alt="Valentine Image" class="card-image">
                <img src="image/4.PNG" alt="Valentine Image" class="card-image">
            </div>

            <!-- ข้อความ -->
            <p class="card-message">
                💖Happy Valentine's Day orang comel 🌹
            </p>
        </div>
    </div>
    <div class="card">
       <h1>🌹 Boleh jadi Valentine saya? 🌹</h1>

       <div class="flower">💐</div>

       <div class="btn-group">
           <button id="yesBtn">Yaaa 💖</button>
           <button id="noBtn">Tak 😝</button>
       </div>

      <p class="result" id="result"></p>
    </div>

     <!-- ดอกไม้พื้นหลัง -->
       <div class="flower-bg"></div>

       <!-- container สำหรับหัวใจลอยพื้นหลัง -->
       <div class="heart-container"></div>
    <script src="script.js"></script>
</body>
</html>
